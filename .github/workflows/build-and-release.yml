name: Build and Release Addons

on:
  push:

jobs:
  generate-split-stub-sources:
    runs-on:
      - self-hosted
      - macos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate split stub sources
        run: |
          set -euo pipefail

          rm -rf \
            Generated/GodotApplePluginsAVFoundationStub \
            Generated/GodotApplePluginsFoundationStub \
            Generated/GodotApplePluginsGameCenterStub \
            Generated/GodotApplePluginsStoreKitStub \
            Generated/GodotApplePluginsAuthenticationServicesStub \
            Generated/GodotApplePluginsARKitStub \
            Generated/GodotApplePluginsCoreMotionStub

          make split-generate-stubs

          COPYFILE_DISABLE=1 tar -czf split-stub-sources.tar.gz \
            Generated/GodotApplePluginsAVFoundationStub \
            Generated/GodotApplePluginsFoundationStub \
            Generated/GodotApplePluginsGameCenterStub \
            Generated/GodotApplePluginsStoreKitStub \
            Generated/GodotApplePluginsAuthenticationServicesStub \
            Generated/GodotApplePluginsARKitStub \
            Generated/GodotApplePluginsCoreMotionStub

      - name: Upload split stub sources
        uses: actions/upload-artifact@v4
        with:
          name: godot-apple-plugins-split-stub-sources
          path: split-stub-sources.tar.gz
          if-no-files-found: error

  build-stub-linux-x64:
    needs: generate-split-stub-sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download split stub sources
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-split-stub-sources
          path: .

      - name: Extract split stub sources
        run: |
          tar -xzf split-stub-sources.tar.gz
          rm -rf Generated/GodotApplePluginsStub

      - name: Fetch GDExtension headers
        run: |
          mkdir -p .tmp/gdextension
          curl -fsSL \
            https://raw.githubusercontent.com/migueldeicaza/SwiftGodot/61f258c8a679ca8e2b637befb77daf1a640a5349/Sources/GDExtension/include/gdextension_interface.h \
            -o .tmp/gdextension/gdextension_interface.h

      - name: Build Linux x64 stubs
        run: |
          mkdir -p dist
          for src in Generated/GodotApplePlugins*Stub/*_stub.c; do
            case "$(basename "$src")" in ._*) continue ;; esac
            base="$(basename "${src%.c}")"
            cc -std=c11 -Wall -Wextra -shared -fPIC \
              -I .tmp/gdextension \
              "$src" \
              -o "dist/${base}.linux.x86_64.so"
          done

      - name: Upload Linux x64 stubs
        uses: actions/upload-artifact@v4
        with:
          name: godot-apple-plugins-split-stubs-linux-x64
          path: dist/*.so
          if-no-files-found: error

  build-stub-linux-arm64:
    needs: generate-split-stub-sources
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download split stub sources
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-split-stub-sources
          path: .

      - name: Extract split stub sources
        run: |
          tar -xzf split-stub-sources.tar.gz
          rm -rf Generated/GodotApplePluginsStub

      - name: Fetch GDExtension headers
        run: |
          mkdir -p .tmp/gdextension
          curl -fsSL \
            https://raw.githubusercontent.com/migueldeicaza/SwiftGodot/61f258c8a679ca8e2b637befb77daf1a640a5349/Sources/GDExtension/include/gdextension_interface.h \
            -o .tmp/gdextension/gdextension_interface.h

      - name: Build Linux ARM64 stubs
        run: |
          mkdir -p dist
          for src in Generated/GodotApplePlugins*Stub/*_stub.c; do
            case "$(basename "$src")" in ._*) continue ;; esac
            base="$(basename "${src%.c}")"
            cc -std=c11 -Wall -Wextra -shared -fPIC \
              -I .tmp/gdextension \
              "$src" \
              -o "dist/${base}.linux.arm64.so"
          done

      - name: Upload Linux ARM64 stubs
        uses: actions/upload-artifact@v4
        with:
          name: godot-apple-plugins-split-stubs-linux-arm64
          path: dist/*.so
          if-no-files-found: error

  build-stub-windows-x64:
    needs: generate-split-stub-sources
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download split stub sources
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-split-stub-sources
          path: .

      - name: Extract split stub sources
        shell: bash
        run: |
          tar -xzf split-stub-sources.tar.gz
          rm -rf Generated/GodotApplePluginsStub

      - name: Fetch GDExtension headers
        run: |
          New-Item -ItemType Directory -Force -Path .tmp/gdextension | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/migueldeicaza/SwiftGodot/61f258c8a679ca8e2b637befb77daf1a640a5349/Sources/GDExtension/include/gdextension_interface.h" `
            -OutFile ".tmp/gdextension/gdextension_interface.h"

      - name: Build Windows x64 stubs
        shell: cmd
        run: |
          if not exist dist mkdir dist
          set "VSWHERE=%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe"
          for /f "usebackq delims=" %%i in (`"%VSWHERE%" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find Common7\Tools\VsDevCmd.bat`) do set "VSDEVCMD=%%i"
          if not defined VSDEVCMD exit /b 1
          call "%VSDEVCMD%" -arch=x64
          for /r Generated %%s in (*_stub.c) do (
            echo %%~nxs | findstr /b /c:"._" >nul
            if errorlevel 1 (
              cl /std:c11 /W4 /LD /I .tmp\gdextension "%%s" /link /OUT:"dist\%%~ns.windows.x86_64.dll"
              if errorlevel 1 exit /b 1
            )
          )

      - name: Upload Windows x64 stubs
        uses: actions/upload-artifact@v4
        with:
          name: godot-apple-plugins-split-stubs-windows-x64
          path: dist/*.dll
          if-no-files-found: error

  build-stub-windows-arm64:
    needs: generate-split-stub-sources
    runs-on: windows-11-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download split stub sources
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-split-stub-sources
          path: .

      - name: Extract split stub sources
        shell: bash
        run: |
          tar -xzf split-stub-sources.tar.gz
          rm -rf Generated/GodotApplePluginsStub

      - name: Fetch GDExtension headers
        run: |
          New-Item -ItemType Directory -Force -Path .tmp/gdextension | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/migueldeicaza/SwiftGodot/61f258c8a679ca8e2b637befb77daf1a640a5349/Sources/GDExtension/include/gdextension_interface.h" `
            -OutFile ".tmp/gdextension/gdextension_interface.h"

      - name: Build Windows ARM64 stubs
        shell: cmd
        run: |
          if not exist dist mkdir dist
          set "VSWHERE=%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe"
          for /f "usebackq delims=" %%i in (`"%VSWHERE%" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -find Common7\Tools\VsDevCmd.bat`) do set "VSDEVCMD=%%i"
          if not defined VSDEVCMD exit /b 1
          call "%VSDEVCMD%" -arch=arm64 -host_arch=x64
          for /r Generated %%s in (*_stub.c) do (
            echo %%~nxs | findstr /b /c:"._" >nul
            if errorlevel 1 (
              cl /std:c11 /W4 /LD /I .tmp\gdextension "%%s" /link /OUT:"dist\%%~ns.windows.arm64.dll"
              if errorlevel 1 exit /b 1
            )
          )

      - name: Upload Windows ARM64 stubs
        uses: actions/upload-artifact@v4
        with:
          name: godot-apple-plugins-split-stubs-windows-arm64
          path: dist/*.dll
          if-no-files-found: error

  package:
    needs:
      - build-stub-linux-x64
      - build-stub-linux-arm64
      - build-stub-windows-x64
      - build-stub-windows-arm64
    runs-on:
      - self-hosted
      - macos
    timeout-minutes: 120
    permissions:
      contents: write
    env:
      GIT_CONFIG_NOSYSTEM: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Import Code Signing Certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          DEFAULT_KEYCHAIN_PATH=""
          if security default-keychain -d user >/tmp/default-keychain-path 2>/dev/null; then
            DEFAULT_KEYCHAIN_PATH=$(tr -d '"' </tmp/default-keychain-path)
          fi
          ORIGINAL_KEYCHAINS=$(
            security list-keychains -d user |
            tr -d '"' |
            tr '\n' ' '
          )
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $ORIGINAL_KEYCHAINS

          # Import certificate
          printf '%s' "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "DEFAULT_KEYCHAIN_PATH=$DEFAULT_KEYCHAIN_PATH"
            echo "ORIGINAL_KEYCHAINS=$ORIGINAL_KEYCHAINS"
          } >> "$GITHUB_ENV"

      - name: Build split xcframework package
        env:
          XCODEBUILD_LOG_ON_ERROR: 1
          XCODEBUILD_LOG_DIR: ${{ runner.temp }}
        run: |
          set -euo pipefail

          make split-build DESTINATIONS="generic/platform=iOS generic/platform=iOS\ Simulator platform=macOS,arch=arm64"

          x86_xcodebuild="xcodebuild"
          if [ "$(uname -m)" = "arm64" ]; then
            if ! arch -x86_64 /usr/bin/true 2>/dev/null; then
              echo "Rosetta is required to build macOS x86_64 frameworks on this arm64 runner" >&2
              exit 1
            fi
            x86_xcodebuild="arch -x86_64 xcodebuild"
          fi

          make split-build DESTINATIONS="platform=macOS,arch=x86_64" XCODEBUILD="$x86_xcodebuild"

      - name: Package split addons for Distribution
        run: make split-dist

      - name: Download Linux x64 split stubs
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-split-stubs-linux-x64
          path: ${{ runner.temp }}/split-stubs/linux-x64

      - name: Download Linux ARM64 split stubs
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-split-stubs-linux-arm64
          path: ${{ runner.temp }}/split-stubs/linux-arm64

      - name: Download Windows x64 split stubs
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-split-stubs-windows-x64
          path: ${{ runner.temp }}/split-stubs/windows-x64

      - name: Download Windows ARM64 split stubs
        uses: actions/download-artifact@v4
        with:
          name: godot-apple-plugins-split-stubs-windows-arm64
          path: ${{ runner.temp }}/split-stubs/windows-arm64

      - name: Install split stubs
        run: |
          set -euo pipefail

          install_stub() {
            local stub="$1"
            local file
            local addon

            file="$(basename "$stub")"
            case "$file" in
              godot_apple_plugins_avfoundation_stub.*)
                addon="GodotApplePluginsAVFoundation"
                ;;
              godot_apple_plugins_foundation_stub.*)
                addon="GodotApplePluginsFoundation"
                ;;
              godot_apple_plugins_game_center_stub.*)
                addon="GodotApplePluginsGameCenter"
                ;;
              godot_apple_plugins_storekit_stub.*)
                addon="GodotApplePluginsStoreKit"
                ;;
              godot_apple_plugins_authentication_services_stub.*)
                addon="GodotApplePluginsAuthenticationServices"
                ;;
              godot_apple_plugins_arkit_stub.*)
                addon="GodotApplePluginsARKit"
                ;;
              godot_apple_plugins_core_motion_stub.*)
                addon="GodotApplePluginsCoreMotion"
                ;;
              *)
                echo "Unknown split stub: $file" >&2
                return 1
                ;;
            esac

            mkdir -p "addons/$addon/bin"
            cp "$stub" "addons/$addon/bin/$file"
          }

          find "$RUNNER_TEMP/split-stubs" -type f \( -name '*.so' -o -name '*.dll' \) -print0 |
            while IFS= read -r -d '' stub; do
              install_stub "$stub"
            done

          for addon_prefix in \
            GodotApplePluginsAVFoundation:godot_apple_plugins_avfoundation_stub \
            GodotApplePluginsFoundation:godot_apple_plugins_foundation_stub \
            GodotApplePluginsGameCenter:godot_apple_plugins_game_center_stub \
            GodotApplePluginsStoreKit:godot_apple_plugins_storekit_stub \
            GodotApplePluginsAuthenticationServices:godot_apple_plugins_authentication_services_stub \
            GodotApplePluginsARKit:godot_apple_plugins_arkit_stub \
            GodotApplePluginsCoreMotion:godot_apple_plugins_core_motion_stub; do
            addon="${addon_prefix%%:*}"
            prefix="${addon_prefix#*:}"
            for stub in \
              "$prefix.linux.x86_64.so" \
              "$prefix.linux.arm64.so" \
              "$prefix.windows.x86_64.dll" \
              "$prefix.windows.arm64.dll"; do
              test -f "addons/$addon/bin/$stub"
            done
          done

      - name: Sign macOS frameworks
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          set -euo pipefail

          # Find signing identity from keychain (first code signing certificate)
          SIGNING_IDENTITY=$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" |
            awk -F'"' '/Developer ID Application/ { print $2; exit }'
          )
          test -n "$SIGNING_IDENTITY"
          echo "Using signing identity: $SIGNING_IDENTITY"

          # Sign all standalone macOS frameworks, including split addons and shared runtime.
          find \
            addons/GodotApplePluginsAVFoundation \
            addons/GodotApplePluginsFoundation \
            addons/GodotApplePluginsGameCenter \
            addons/GodotApplePluginsStoreKit \
            addons/GodotApplePluginsAuthenticationServices \
            addons/GodotApplePluginsARKit \
            addons/GodotApplePluginsCoreMotion \
            addons/GodotApplePluginsRuntime \
            -path '*/bin/*.framework' -type d -print | sort > "$RUNNER_TEMP/macos-frameworks.txt"
          if [ ! -s "$RUNNER_TEMP/macos-frameworks.txt" ]; then
            echo "No macOS frameworks found to sign" >&2
            exit 1
          fi

          while IFS= read -r fw; do
            echo "Signing $fw"
            codesign --keychain "$KEYCHAIN_PATH" --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" \
              "$fw"
            echo "Verifying $fw"
            codesign --keychain "$KEYCHAIN_PATH" --verify --strict --deep --verbose=2 "$fw"
          done < "$RUNNER_TEMP/macos-frameworks.txt"

      - name: Archive addons directory
        run: |
          PACKAGE_NAME="GodotApplePlugins-addons-${GITHUB_SHA}.zip"
          rm -rf dist
          mkdir -p dist/addons
          for addon in \
            GodotApplePluginsAVFoundation \
            GodotApplePluginsFoundation \
            GodotApplePluginsGameCenter \
            GodotApplePluginsStoreKit \
            GodotApplePluginsAuthenticationServices \
            GodotApplePluginsARKit \
            GodotApplePluginsCoreMotion \
            GodotApplePluginsRuntime; do
            test -d "addons/$addon"
            ditto "addons/$addon" "dist/addons/$addon"
          done
          ditto -c -k --sequesterRsrc --keepParent dist "$PACKAGE_NAME"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"

      - name: Notarize
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$PACKAGE_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Publish release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.sha }}
          name: Addons build for ${{ github.sha }}
          body: Automated build triggered by ${{ github.ref }}
          files: ${{ env.PACKAGE_NAME }}

      - name: Clean up signing keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true

          if [ -n "${DEFAULT_KEYCHAIN_PATH:-}" ] && [ -e "$DEFAULT_KEYCHAIN_PATH" ]; then
            security default-keychain -d user -s "$DEFAULT_KEYCHAIN_PATH" || true
          fi

          existing_keychains=()
          for keychain in ${ORIGINAL_KEYCHAINS:-}; do
            if [ -e "$keychain" ]; then
              existing_keychains+=("$keychain")
            fi
          done

          if [ "${#existing_keychains[@]}" -gt 0 ]; then
            security list-keychains -d user -s "${existing_keychains[@]}" || true
          fi
